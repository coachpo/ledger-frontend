name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: postgresql+psycopg://ledger:ledger@127.0.0.1:25432/ledger
      TEST_DATABASE_URL: postgresql+psycopg://ledger:ledger@127.0.0.1:25432/ledger
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ledger
          POSTGRES_USER: ledger
          POSTGRES_PASSWORD: ledger
        ports:
          - 25432:5432
        options: >-
          --health-cmd "pg_isready -U ledger -d ledger"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout frontend repository
        uses: actions/checkout@v6
        with:
          path: frontend

      - name: Checkout backend repository for E2E
        uses: actions/checkout@v6
        with:
          repository: coachpo/ledger-backend
          path: backend

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.9.8"
          python-version: "3.13"

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install backend dependencies for E2E
        working-directory: backend
        run: uv sync --frozen

      - name: Install Playwright browser
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run frontend checks
        working-directory: frontend
        run: |
          pnpm lint
          pnpm build
          pnpm test:e2e

  docker-build-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: [quality]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: false
          cache-from: type=gha,scope=frontend-ci
          cache-to: type=gha,scope=frontend-ci,mode=max
